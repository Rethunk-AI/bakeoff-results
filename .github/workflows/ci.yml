name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compile Python
        run: python -m compileall src tests

      - name: Run tests
        run: PYTHONPATH=src python -m unittest discover -s tests

      - name: Validate submissions
        run: PYTHONPATH=src python -m bakeoff_results.validate --scan --allow-empty submissions

      - name: Build static index
        run: PYTHONPATH=src python -m bakeoff_results.build_index --submissions submissions --site site

  publish:
    needs: verify
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    permissions:
      contents: read
      id-token: write
      attestations: write
      pages: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate submissions (signature required)
        run: PYTHONPATH=src python -m bakeoff_results.validate --scan --allow-empty --require-signature submissions

      - name: Build static index
        run: PYTHONPATH=src python -m bakeoff_results.build_index --submissions submissions --site site

      - name: Attest site artifacts
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            site/index.json
            site/index.html

      - name: Enable Pages (public)
        run: |
          gh api --method POST "repos/$GITHUB_REPOSITORY/pages" \
            -f source[branch]=main \
            -f source[path]=/site \
            -f public=true \
            || gh api --method PUT "repos/$GITHUB_REPOSITORY/pages" \
            -f public=true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
