name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Verify signers.yaml commit signature
        run: |
          # Check if the last commit touching signers.yaml is signed
          last_commit=$(git log --format=%H -1 -- signers.yaml)
          if [ -z "$last_commit" ]; then
            echo "No commits found for signers.yaml; skipping signature check"
            exit 0
          fi

          signature=$(git log --format=%B "$last_commit" | grep -i "gpgsig\|ssh")
          if [ -z "$signature" ]; then
            echo "WARNING: Last commit to signers.yaml is not GPG/SSH signed"
            echo "Commit: $last_commit"
            echo "For production, this should trigger a hard failure."
            exit 0
          fi
          echo "INFO: signers.yaml commit is signed"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Compile Python
        run: python -m compileall src tests

      - name: Run tests
        run: PYTHONPATH=src python -m unittest discover -s tests

      - name: Validate submissions
        run: PYTHONPATH=src python -m bakeoff_results.validate --scan --allow-empty submissions

      - name: Build static index
        run: PYTHONPATH=src python -m bakeoff_results.build_index --submissions submissions --site site

  publish:
    needs: verify
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    permissions:
      contents: read
      id-token: write
      attestations: write
      pages: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Verify signers.yaml commit signature
        run: |
          # Check if the last commit touching signers.yaml is signed
          last_commit=$(git log --format=%H -1 -- signers.yaml)
          if [ -z "$last_commit" ]; then
            echo "No commits found for signers.yaml; skipping signature check"
            exit 0
          fi

          signature=$(git log --format=%B "$last_commit" | grep -i "gpgsig\|ssh")
          if [ -z "$signature" ]; then
            echo "WARNING: Last commit to signers.yaml is not GPG/SSH signed"
            echo "Commit: $last_commit"
            echo "For production, this should trigger a hard failure."
            exit 0
          fi
          echo "INFO: signers.yaml commit is signed"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Validate submissions (signature required)
        run: PYTHONPATH=src python -m bakeoff_results.validate --scan --allow-empty --require-signature submissions

      - name: Build static index
        run: PYTHONPATH=src python -m bakeoff_results.build_index --submissions submissions --site site

      - name: Attest site artifacts
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            site/index.json
            site/index.html

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./site

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v5
